x-apparmor: &apparmor
  security_opt:
    - apparmor:unconfined

services:
  colossus-api:
    build: ./apps/api
    container_name: colossus-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - colossus-db
      - colossus-redis
    restart: unless-stopped
    <<: *apparmor

  colossus-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: colossus-web
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    <<: *apparmor

  colossus-worker:
    build: ./apps/api
    container_name: colossus-worker
    command: celery -A app.worker worker --loglevel=info
    env_file: .env
    depends_on:
      - colossus-db
      - colossus-redis
    restart: unless-stopped
    <<: *apparmor

  colossus-db:
    image: postgres:16
    container_name: colossus-db
    environment:
      POSTGRES_DB: colossus
      POSTGRES_USER: colossus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - colossus-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    <<: *apparmor

  colossus-redis:
    image: redis:7-alpine
    container_name: colossus-redis
    restart: unless-stopped
    <<: *apparmor

  colossus-minio:
    image: minio/minio
    container_name: colossus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - colossus-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    <<: *apparmor

volumes:
  colossus-db-data:
  colossus-minio-data:
